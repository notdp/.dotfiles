# Prefix key: Ctrl+b (default)

# Enable mouse (drag pane borders to resize, click to select pane, scroll)
set -g mouse on

# 256 color support + hyperlinks
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:hyperlinks"
set -g allow-passthrough on
set -g set-clipboard on

# Start window/pane index at 1
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape delay (important for vim/neovim)
set -sg escape-time 10

# Split panes in current directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# New window also inherits current directory
bind c new-window -c "#{pane_current_path}"

# ── Pane borders ──
set -g pane-border-style "fg=green"
set -g pane-active-border-style "fg=green"

# ── Status bar ──
set -g status-style "bg=green,fg=#1e1e1e"
set -g window-status-format "  #I #W  "
set -g window-status-current-format "#[bg=yellow,fg=black,bold]  #I #W  #[default]"
set -g window-status-separator ""
set -g status-left "#{?client_prefix,#[bg=red#,fg=white#,bold] ^B #[bg=green#,fg=red],#[bg=yellow#,fg=black#,bold] #S #[bg=green#,fg=yellow]}#[default] "
set -g status-left-length 20
set -g status-right "#[fg=yellow]#[bg=yellow,fg=black] %Y-%m-%d %a %H:%M "

# Pane layout shortcuts
bind h select-layout even-horizontal   # Ctrl+b h 左右均分
bind e select-layout even-vertical     # Ctrl+b e 上下均分
bind t select-layout tiled             # Ctrl+b t 平铺（4个就2x2）
bind m swap-pane -s '{top-left}' \; select-layout main-vertical     # Ctrl+b m 当前pane做主，左大右小
bind M swap-pane -s '{top-left}' \; select-layout main-horizontal   # Ctrl+b M 当前pane做主，上大下小
set -g main-pane-width 50%
set -g main-pane-height 50%
bind -n M-r rotate-window          # Cmd+r 轮换pane位置（布局不变）
bind b break-pane                # Ctrl+b b 拆成独立 window
bind v choose-tree 'join-pane -h -s "%%"'  # Ctrl+b v 合并（左右）
bind g choose-tree 'join-pane -v -s "%%"'  # Ctrl+b g 合并（上下）

# Swap pane position (Ctrl+b 方向键)
bind Up swap-pane -U
bind Down swap-pane -D
bind Left swap-pane -U
bind Right swap-pane -D

# Bound via Ghostty Cmd keybinds (sends Alt+key)
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-0 select-window -t :=0
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
bind -n M-f run-shell -b 'hive fork --pane "#{pane_id}" >/dev/null 2>&1'
bind -n M-c run-shell -b 'hive compact --pane "#{pane_id}" >/dev/null 2>&1'
bind -n M-w kill-pane
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-S-Left swap-window -t -1\; select-window -t -1
bind -n M-S-Right swap-window -t +1\; select-window -t +1
bind -n M-Enter next-layout

# Vi mode for copy-mode
setw -g mode-keys vi

# Restore default copy/paste bindings
bind [ copy-mode
bind ] paste-buffer -p
